<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roop Rental Services</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1e2952">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --indigo-950:#0f1530; --indigo-900:#1e2952; --indigo-800:#2b3968; --indigo-700:#3a4a82;
    --amber:#f59e0b; --amber-dark:#b45309;
    --bg:#f3f4fa; --card:#ffffff; --text:#161b33; --text-soft:#5b6280; --border:#e4e6f2;
    --green:#16a34a; --yellow:#d97706; --red:#dc2626; --brown:#8a5a2b; --grey:#8b8fa3;
    --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#0b0e1f; --card:#161b33; --text:#eef0fb; --text-soft:#9ba1c2; --border:#252b4a;
  }
  [data-theme="gray"]{
    --bg:#eceef2; --card:#f7f8fa; --text:#2b2e38; --text-soft:#6b7280; --border:#d7dae0;
    --indigo-900:#3f4756; --indigo-800:#4b5563;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--app-font-family,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif);
    font-weight:var(--app-font-weight,400);
    background:var(--bg); color:var(--text); overscroll-behavior-y:contain;
    -webkit-tap-highlight-color:transparent;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:78px;position:relative;}

  header.topbar{
    position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--indigo-900),var(--indigo-800));
    color:#fff;padding:14px 18px 16px;border-radius:0 0 20px 20px;box-shadow:0 6px 20px rgba(15,21,48,.25);
    transition:padding .15s ease;
  }
  header.topbar.collapsed{padding:8px 18px 10px;}
  header.topbar.collapsed .row1{display:none;}
  header.topbar.collapsed .search-bar{margin-top:0;}
  header.topbar .row1{display:flex;align-items:center;justify-content:space-between;}
  header.topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px;}
  header.topbar .sub{font-size:11.5px;opacity:.75;margin-top:2px;}
  .icon-btn{background:rgba(255,255,255,.14);border:none;color:#fff;width:34px;height:34px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .search-bar{margin-top:12px;display:flex;gap:8px;align-items:center;}
  .search-bar input{flex:1;border:none;border-radius:12px;padding:10px 14px;font-size:14px;background:rgba(255,255,255,.16);color:#fff;}
  .search-bar input::placeholder{color:rgba(255,255,255,.65);}
  .time-picker{display:flex;align-items:center;gap:4px;}
  .time-picker select{border:1px solid var(--border);border-radius:9px;padding:9px 4px;background:var(--card);color:var(--text);font-size:13px;}
  .time-picker .tp-hour, .time-picker .tp-min{width:52px;}
  .time-picker .tp-ampm{width:60px;}

  main{padding:14px 14px 10px;}

  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);transition:transform .15s ease;}
  .stat-card:active{transform:scale(.97);}
  .stat-card .num{font-size:22px;font-weight:800;}
  .stat-card .lbl{font-size:11.5px;color:var(--text-soft);margin-top:2px;}
  .stat-card.accent{background:linear-gradient(135deg,var(--amber),var(--amber-light,var(--amber)));color:#2b1400;border:none;box-shadow:0 6px 16px rgba(245,158,11,.3);}
  .stat-card.accent .lbl{color:#5a3200;}

  .section-title{font-size:14px;font-weight:700;margin:18px 2px 8px;display:flex;justify-content:space-between;align-items:center;padding-left:10px;position:relative;}
  .section-title::before{content:'';position:absolute;left:0;top:1px;bottom:1px;width:4px;border-radius:4px;background:linear-gradient(180deg,var(--amber),var(--indigo-800));}
  .section-title a{font-size:12px;color:var(--amber-dark);font-weight:600;}

  .card{background:var(--card);border-style:solid;border-color:var(--border);border-width:var(--card-border-w,1px);border-radius:var(--radius);padding:var(--card-pad,13px 14px);margin-bottom:10px;box-shadow:var(--card-shadow,none);transition:transform var(--transition-duration,.12s) ease,box-shadow var(--transition-duration,.12s) ease;}
  .rental-card:active, .card[data-open-rental]:active, .card[data-open-customer]:active{transform:scale(.98);box-shadow:0 2px 10px rgba(30,41,82,.1);}
  .rental-card{display:block;}
  .rental-card .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .rental-card .name{font-weight:700;font-size:14.5px;}
  .rental-card .items{font-size:12.5px;color:var(--text-soft);margin-top:3px;}
  .rental-card .meta{font-size:11.5px;color:var(--text-soft);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;}
  .compact-card{padding:9px 11px;margin-bottom:7px;}
  .compact-card .name{font-size:13px;}
  .compact-card .items{font-size:11.5px;margin-top:1px;}
  .compact-card .meta{font-size:10.5px;margin-top:4px;gap:8px;}
  .compact-card .badge{font-size:9.5px;padding:2px 7px;}
  .compact-card .due-amt{font-size:12.5px;}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap;}
  .badge.on{background:var(--green);} .badge.partial{background:var(--yellow);}
  .badge.returned{background:var(--red);} .badge.pending{background:var(--brown);} .badge.archived{background:var(--grey);}
  .badge.draft{background:#8b5cf6;}
  .due-amt{font-weight:800;font-size:14px;color:var(--red);}
  .due-amt.clear{color:var(--green);}

  .fab{position:fixed;right:18px;bottom:86px;width:58px;height:58px;border-radius:50%;
    background:linear-gradient(135deg,var(--amber),#ea7c1f);color:#2b1400;border:none;font-size:28px;
    box-shadow:0 8px 22px rgba(245,158,11,.45);z-index:25;opacity:.62;transition:opacity .15s ease;touch-action:none;}
  .fab:active{opacity:1;}
  .fab.dragging{opacity:.85;box-shadow:0 4px 14px rgba(245,158,11,.3);}

  nav.bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--card);
    border-top:1px solid var(--border);display:flex;z-index:24;padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  nav.bottomnav button{flex:1;background:none;border:none;color:var(--text-soft);font-size:9.5px;padding:6px 1px;
    display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;}
  nav.bottomnav button .ic{font-size:17px;}
  nav.bottomnav button.active{color:var(--amber-dark);font-weight:700;}

  .empty{text-align:center;color:var(--text-soft);font-size:13px;padding:30px 10px;}

  /* Forms */
  .field{margin-bottom:12px;position:relative;}
  .field label{font-size:12px;font-weight:600;color:var(--text-soft);display:block;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:11px;background:var(--card);
    color:var(--text);font-size:14px;font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:60px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .autofill-list{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);
    border-radius:11px;max-height:180px;overflow:auto;z-index:30;box-shadow:0 8px 20px rgba(0,0,0,.12);margin-top:4px;}
  .autofill-list div{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border);}
  .autofill-list div:last-child{border-bottom:none;}
  .autofill-list div b{display:block;}
  .autofill-list div span{font-size:11px;color:var(--text-soft);}

  .item-row{border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;position:relative;background:var(--bg);}

  .std-item-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
  .catalog-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
  .catalog-row .cat-name{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:13px;}
  .catalog-row .cat-rate{width:72px;padding:8px 6px;text-align:center;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:13px;}
  .catalog-row .cat-del{background:none;border:none;color:var(--red);font-size:16px;flex-shrink:0;padding:4px 6px;}
  .std-item-row:last-child{border-bottom:none;}
  .std-item-label{flex:1;font-size:13px;font-weight:600;}
  .std-x{font-size:12px;color:var(--text-soft);}
  .std-qty{width:56px;text-align:center;padding:8px 4px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:14px;font-weight:700;}
  .std-qty:not(:placeholder-shown){border-color:var(--amber);background:#fff7ec;}
  .std-rate{width:64px;text-align:center;padding:8px 4px;border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text-soft);font-size:12.5px;}
  .item-row .del-item{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--red);font-size:16px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .tc-label{font-size:12px;font-weight:700;color:var(--text-soft);display:block;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.3px;}
  .tc-label:first-child{margin-top:0;}
  .accent-swatch{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .accent-swatch.active{border-color:var(--text);box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--text-soft);}
  .accent-swatch.custom-swatch{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)!important;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  body[data-dash-density="compact"] .stat-grid{gap:6px;}
  body[data-dash-density="compact"] .stat-card{padding:9px;}
  body[data-dash-density="compact"] .stat-card .num{font-size:18px;}
  .chip{font-size:11.5px;padding:6px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text-soft);}
  .chip.active{background:var(--indigo-900);color:#fff;border-color:var(--indigo-900);}

  .totals-box{background:var(--indigo-900);color:#fff;border-radius:14px;padding:14px;margin-top:6px;}
  .totals-box .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
  .totals-box .row.big{font-size:16px;font-weight:800;border-top:1px solid rgba(255,255,255,.2);margin-top:6px;padding-top:8px;}

  .btn{display:block;width:100%;padding:var(--btn-pad,13px);border-radius:var(--btn-radius,12px);border:none;font-weight:700;font-size:14.5px;font-family:inherit;text-align:center;transition:transform var(--transition-duration,.12s) ease;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber-dark));color:#2b1400;}
  body[data-btn-fill="outlined"] .btn-primary{background:none;border:2px solid var(--amber);color:var(--amber-dark);box-shadow:none;}
  .btn-outline{background:none;border:1.5px solid var(--border);color:var(--text);}
  .btn-ghost{background:var(--bg);color:var(--text);}
  .btn-row{display:flex;gap:10px;margin-top:14px;}
  .btn-row .btn{flex:1;}
  .btn-sm{width:auto;padding:8px 14px;font-size:12.5px;display:inline-block;}
  .btn-danger{background:var(--red);color:#fff;}

  .page{padding-bottom:20px;}
  .page-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .page-header h2{font-size:17px;margin:0;flex:1;}
  .back-btn{background:var(--card);border:1px solid var(--border);width:36px;height:36px;border-radius:11px;font-size:16px;}

  .filter-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
  .filter-scroll::-webkit-scrollbar{display:none;}
  .filter-scroll .chip{white-space:nowrap;flex-shrink:0;}

  .modal-overlay{position:fixed;inset:0;background:rgba(10,12,25,.55);z-index:50;display:flex;align-items:flex-end;}
  .modal-sheet{background:var(--bg);width:100%;max-width:520px;margin:0 auto;border-radius:22px 22px 0 0;
    max-height:92vh;overflow:auto;padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 12px;}

  .kyc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
  .kyc-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);position:relative;background:var(--bg);}
  .kyc-thumb img{width:100%;height:100%;object-fit:cover;}
  .kyc-thumb .lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;padding:3px 4px;text-align:center;}
  .kyc-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#161b33;color:#fff;
    padding:10px 18px;border-radius:20px;font-size:13px;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.3);}

  .lockscreen{position:fixed;inset:0;background:var(--indigo-950);z-index:100;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#fff;}
  .pin-dots{display:flex;gap:14px;margin:20px 0;}
  .pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.4);}
  .pin-dots span.filled{background:var(--amber);border-color:var(--amber);}
  .keypad{display:grid;grid-template-columns:repeat(3,64px);gap:16px;}
  .keypad button{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:20px;}

  a{color:inherit;}
  .swipe-actions{display:flex;gap:8px;margin-top:8px;}
  canvas{max-width:100%;}
</style>
</head>
<body data-theme="light">
<div id="app">
  <div id="errorBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:#dc2626;color:#fff;padding:10px 14px;font-size:12px;font-family:monospace;white-space:pre-wrap;max-height:40vh;overflow:auto;"></div>
  <div id="lockscreen"></div>
  <header class="topbar">
    <div class="row1">
      <div style="display:flex;align-items:center;gap:10px;">
        <img id="headerLogo" style="display:none;height:38px;width:38px;object-fit:contain;border-radius:10px;background:#fff;padding:3px;">
        <div>
          <h1 id="headerTitle">Roop Rental Services</h1>
          <div class="sub" id="headerSub">Ahmedabad · Adil Ansari</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="icon-btn" id="headerCollapseBtn" title="Hide header for more space">⌃</button>
        <button class="icon-btn" id="themeToggle">🌙</button>
      </div>
    </div>
    <div class="search-bar">
      <input id="globalSearch" placeholder="Search customer, mobile, item, notes...">
    </div>
  </header>
  <main id="main"></main>
  <button class="fab" id="fabAdd">+</button>
  <nav class="bottomnav">
    <button data-view="dashboard"><span class="ic">🏠</span>Home</button>
    <button data-view="rentals" class="active"><span class="ic">📦</span>Rentals</button>
    <button data-view="invoices"><span class="ic">🧾</span>Invoices</button>
    <button data-view="customers"><span class="ic">👥</span>Customers</button>
    <button data-view="reports"><span class="ic">📊</span>Reports</button>
    <button data-view="settings"><span class="ic">⚙️</span>Settings</button>
  </nav>
</div>
<div id="modalRoot"></div>
<script>
  function showErr(msg){
    var b = document.getElementById('errorBanner');
    b.style.display = 'block';
    b.textContent = '⚠️ App error — screenshot this and send it:\n' + msg;
  }
  window.addEventListener('error', function(e){
    var msg = e.message ? (e.message+' @ '+(e.filename||'')+':'+(e.lineno||'')) : ('Failed to load: ' + (e.target && e.target.src || e.target && e.target.href || 'unknown file'));
    showErr(msg);
  }, true);
  window.addEventListener('unhandledrejection', function(e){ showErr('Promise error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason)); });
</script>
<script src="./app.js" onerror="showErr('app.js failed to load — check the file was uploaded and the path/case matches exactly.')"></script>
</body>
</html>
